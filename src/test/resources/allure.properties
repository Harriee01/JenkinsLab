# Allure configuration for the Fake Store API test suite
#
# The allure.results.directory value here is intentionally left as the default.
# The Surefire plugin in pom.xml passes -Dallure.results.directory to override
# this at build time, pointing results to target/allure-results.
#
# See also: https://allurereport.org/docs/junit5/

# Directory where Allure writes JSON result files during test execution.
# Override with: -Dallure.results.directory=<path>
allure.results.directory=target/allure-results

# Link patterns — used to hyperlink issues/TMS items in the report.
# Adjust these URLs to match your project management tooling.
# allure.link.issue.pattern=https://jira.example.com/browse/{}
# allure.link.tms.pattern=https://testlink.example.com/test/{}
